# ===========================================================================
# English Streak — Docker Compose (bot + PostgreSQL)
# ===========================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: english-streak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Exposed only on localhost so the DB is not reachable from the public VPS
    # interface. Remove this block entirely to keep it internal-only.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - english-streak

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-streak-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override host so the bot reaches Postgres via the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - english-streak

volumes:
  postgres_data:
    driver: local

networks:
  english-streak:
    # Fixed name so the closed-source events API (separate compose file in ./api)
    # can attach to this same network as `external` and reach `postgres`.
    name: english-streak
    driver: bridge
